name: Daily Update 5-Lines Chart

on:
  schedule:
    - cron: '0 10 * * *' # UTC 10:00 等於台北時間 18:00
  workflow_dispatch: # 允許您在 GitHub 頁面上點擊按鈕手動強制更新

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 複製儲存庫程式碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要套件
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy pandas

    - name: 執行計算
      run: python update_data.py

    - name: 將新數據推回儲存庫
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data.json
        git diff-index --quiet HEAD || (git commit -m "自動更新五線譜數據" && git push)
